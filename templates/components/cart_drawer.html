<!-- Cart Drawer Component [Phase 3 Feature 3] -->
<div x-data="cartStore" 
     @add-to-cart.window="addItem($event.detail.type, $event.detail.id)"
     @open-cart.window="show = true"
     class="relative z-[100]" x-cloak>
    
    <!-- Backdrop -->
    <div x-show="show" 
         x-transition:enter="transition-opacity ease-linear duration-300" 
         x-transition:enter-start="opacity-0" 
         x-transition:enter-end="opacity-100" 
         x-transition:leave="transition-opacity ease-linear duration-300" 
         x-transition:leave-start="opacity-100" 
         x-transition:leave-end="opacity-0" 
         @click="show = false"
         class="fixed inset-0 bg-black/60 backdrop-blur-sm"></div>

    <!-- Panel -->
    <div x-show="show" 
         x-transition:enter="transition ease-in-out duration-500 transform" 
         x-transition:enter-start="translate-x-full" 
         x-transition:enter-end="translate-x-0" 
         x-transition:leave="transition ease-in-out duration-500 transform" 
         x-transition:leave-start="translate-x-0" 
         x-transition:leave-end="translate-x-full" 
         class="fixed inset-y-0 right-0 w-full max-w-md bg-[var(--bg-base)] shadow-2xl flex flex-col border-l border-[var(--border)]">
        
        <!-- Header -->
        <div class="px-6 py-6 border-b border-[var(--border)] flex items-center justify-between bg-[var(--bg-elevated)]">
            <h2 class="font-display text-xl font-bold flex items-center gap-3">
                <span>🛒</span> My Support Cart
                <span x-show="cartData.total_items > 0" 
                      class="bg-[var(--accent-mint)] text-black text-[11px] px-2 py-0.5 rounded-full font-mono" 
                      x-text="cartData.total_items"></span>
            </h2>
            <button @click="show = false" class="text-[var(--text-muted)] hover:text-white transition-colors p-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <!-- Tiered Discount Progress -->
        <div x-show="cartData.total_items > 0" class="px-6 py-4 bg-[var(--accent-mint)]/5 border-b border-[var(--accent-mint)]/20">
            <div class="flex items-center justify-between mb-2">
                <span class="font-mono text-[11px] uppercase tracking-wider text-[var(--accent-mint)]">Bundle Offer Progress</span>
                <span class="font-mono text-[11px] font-bold text-[var(--accent-mint)]" x-text="cartData.discount_percentage + '% OFF Applied'"></span>
            </div>
            
            <!-- Progress Bar -->
            <div class="h-1.5 w-full bg-[var(--bg-elevated)] rounded-full overflow-hidden flex gap-0.5">
                <div class="h-full bg-[var(--accent-mint)] transition-all duration-500" :style="`width: ${Math.min((cartData.total_items / 15) * 100, 100)}%`"></div>
            </div>

            <div class="mt-3 text-[12px] font-body text-[var(--text-muted)]" x-show="cartData.next_tier_info">
                🎉 Add <span class="text-white font-bold" x-text="cartData.next_tier_info.needed"></span> more to unlock <span class="text-[var(--accent-mint)] font-bold" x-text="cartData.next_tier_info.discount + '% OFF'"></span>
            </div>
            <div class="mt-3 text-[12px] font-body text-[var(--accent-mint)] font-bold" x-show="cartData.total_items >= 15">
                🔥 SUPER BUNDLE UNLOCKED: 30% OFF APPLIED!
            </div>
        </div>

        <!-- Items List -->
        <div class="flex-1 overflow-y-auto px-6 py-6 space-y-6 scrollbar-thin scrollbar-thumb-[var(--border)]">
            <template x-if="cartData.total_items === 0">
                <div class="h-full flex flex-col items-center justify-center text-center opacity-40 py-20">
                    <span class="text-6xl mb-6">💿</span>
                    <p class="font-body text-[15px]">Your cart is empty.<br>Support your first artist to get started.</p>
        <div class="flex-1 overflow-y-auto scrollbar-thin scrollbar-thumb-[var(--border)]">
            <template x-if="cartData && cartData.items && cartData.items.length > 0">
                <div class="flex-1 overflow-y-auto p-6 space-y-6">
                    <template x-for="item in cartData.items" :key="item.id">
                        <div class="flex gap-4 group/item">
                            <!-- Artwork -->
                            <div class="w-16 h-16 rounded-lg bg-[var(--bg-elevated)] border border-[var(--border)] overflow-hidden flex-shrink-0">
                                <template x-if="item.artwork_url">
                                    <img :src="item.artwork_url" class="w-full h-full object-cover">
                                </template>
                                <template x-if="!item.artwork_url">
                                    <div class="w-full h-full flex items-center justify-center text-2xl opacity-20">🎧</div>
                                </template>
                            </div>
                            <div class="flex-1 min-w-0">
                                <h4 class="font-body text-[14px] font-[600] text-white truncate" x-text="item.title"></h4>
                                <p class="font-body text-[12px] text-[var(--text-muted)] mt-0.5 truncate" x-text="item.dj_name"></p>
                                <div class="flex items-center justify-between mt-2">
                                    <span class="font-mono text-[13px] text-[var(--accent-mint)]" x-text="`₹${item.price}`"></span>
                                    <button @click="removeItem(item.id)" class="text-[10px] font-mono text-red-400/50 hover:text-red-400 uppercase tracking-tighter transition-colors">
                                        Remove
                                    </button>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Empty State -->
            <template x-if="!cartData || !cartData.items || cartData.items.length === 0">
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center bg-[var(--bg-base)]">
                    <div class="w-16 h-16 rounded-full bg-[var(--bg-elevated)] flex items-center justify-center mb-4">
                        <span class="text-2xl opacity-20">🛒</span>
                    </div>
                    <h3 class="font-display text-[18px] font-bold text-white mb-2">Your cart is empty</h3>
                    <p class="font-body text-[14px] text-[var(--text-muted)] max-w-[200px]">
                        Support your favorite artists by adding their tracks here.
                    </p>
                </div>
            </template>
        </div>

        <!-- Footer / Checkout -->
        <div x-show="cartData && cartData.total_items > 0" class="px-6 py-8 border-t border-[var(--border)] bg-[var(--bg-elevated)]">
            <div class="space-y-3 mb-6">
                <div class="flex justify-between text-[14px] font-body text-[var(--text-muted)]">
                    <span>Subtotal</span>
                    <span x-text="cartData ? '₹' + (cartData.subtotal/100).toFixed(2) : '₹0.00'"></span>
                </div>
                <div x-show="cartData && cartData.discount_amount > 0" class="flex justify-between text-[14px] font-body text-[var(--accent-mint)]">
                    <span x-text="cartData ? `Bundle Discount (${cartData.discount_percentage}%)` : '' "></span>
                    <span x-text="cartData ? '- ₹' + (cartData.discount_amount/100).toFixed(2) : ''"></span>
                </div>
                <div class="flex justify-between text-[18px] font-display font-bold text-white pt-3 border-t border-[var(--border)]">
                    <span>Total</span>
                    <span x-text="cartData ? '₹' + (cartData.final_total/100).toFixed(2) : '₹0.00'"></span>
                </div>
            </div>
            
            <a href="/checkout/" class="btn-mm btn-mint w-full flex items-center justify-center gap-3 font-bold" style="height: 52px; border-radius: 12px;">
                Proceed to Checkout
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                </svg>
            </a>
            
            <p class="mt-4 text-[11px] font-body text-[var(--text-muted)] text-center italic">
                Files will be securely byte-verified after support is complete.
            </p>
        </div>
    </div>
</div>
