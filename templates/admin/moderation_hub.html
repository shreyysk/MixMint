{% extends "base.html" %}
{% load i18n static %}

{% block title %}Moderation Hub — MixMint Admin{% endblock %}

{% block content %}
<div class="max-w-[1200px] mx-auto py-10 px-4 font-body" x-data="moderationHub()">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12 border-b border-[var(--border)] pb-8">
        <div>
            <div class="flex items-center gap-3 mb-6">
                <a href="{% url 'admin_dashboard' %}" class="px-3 py-1.5 bg-[var(--bg-elevated)] border border-[var(--border)] rounded-lg text-[var(--accent-mint)] hover:bg-[var(--border)] font-mono text-[11px] font-bold uppercase tracking-widest flex items-center gap-2 transition-all group">
                    <svg class="w-3 h-3 group-hover:-translate-x-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                    Back to Dashboard
                </a>
            </div>
            <h1 class="font-display text-[40px] font-[700] text-[var(--text-primary)] tracking-tight leading-none uppercase">
                Moderation <span class="text-[var(--accent-mint)]">Hub</span>
            </h1>
            <p class="text-[var(--text-muted)] text-sm mt-4 font-mono uppercase tracking-[0.2em]">
                Content Compliance & Enforcement
            </p>
        </div>
        <div class="flex items-center gap-4">
            <div class="relative">
                <input type="text" x-model="searchQuery" placeholder="Search tracks or DJs..." 
                       class="bg-[var(--bg-elevated)] border border-[var(--border)] rounded-full px-6 py-3 text-sm w-[300px] focus:outline-none focus:border-[var(--accent-mint)] transition-all">
                <span class="absolute right-4 top-1/2 -translate-y-1/2 opacity-40">🔍</span>
            </div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="flex gap-8 mb-8 border-b border-[var(--border)]">
        <button @click="activeTab = 'tracks'" :class="activeTab === 'tracks' ? 'border-b-2 border-[var(--accent-mint)] text-[var(--text-primary)]' : 'text-[var(--text-muted)]'" class="pb-4 font-mono text-[10px] uppercase tracking-widest font-bold transition-all">
            Live Tracks
        </button>
        <button @click="activeTab = 'albums'" :class="activeTab === 'albums' ? 'border-b-2 border-[var(--accent-mint)] text-[var(--text-primary)]' : 'text-[var(--text-muted)]'" class="pb-4 font-mono text-[10px] uppercase tracking-widest font-bold transition-all">
            Album Packs
        </button>
    </div>

    <!-- Content List -->
    <div class="glow-card overflow-hidden p-0 mb-12">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-[var(--bg-base)]/50">
                    <th class="p-6 font-mono text-[10px] text-[var(--text-muted)] uppercase tracking-widest border-b border-[var(--border)]">Content</th>
                    <th class="p-6 font-mono text-[10px] text-[var(--text-muted)] uppercase tracking-widest border-b border-[var(--border)]">Seller</th>
                    <th class="p-6 font-mono text-[10px] text-[var(--text-muted)] uppercase tracking-widest border-b border-[var(--border)]">Status</th>
                    <th class="p-6 font-mono text-[10px] text-[var(--text-muted)] uppercase tracking-widest border-b border-[var(--border)] text-right">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-[var(--border)] font-body text-[15px]">
                <template x-for="item in filteredItems" :key="item.id">
                    <tr class="hover:bg-white/[0.02] transition-colors">
                        <td class="p-6">
                            <div class="font-medium text-[var(--text-primary)]" x-text="item.title"></div>
                            <div class="text-[11px] text-[var(--text-muted)] font-mono" x-text="'ID: ' + item.id"></div>
                        </td>
                        <td class="p-6 text-[var(--text-muted)]" x-text="item.dj_name"></td>
                        <td class="p-6">
                            <span :class="item.is_active ? 'pill-success' : 'pill-warning'" x-text="item.is_active ? 'Active' : 'Hidden'"></span>
                        </td>
                        <td class="p-6 text-right space-x-2">
                            <button @click="openDmcaModal(item)" class="text-xs font-mono uppercase tracking-widest text-[var(--text-muted)] hover:text-[#38bdf8] transition-colors">DMCA</button>
                            <button @click="confirmDelete(item)" class="text-xs font-mono uppercase tracking-widest text-[#ef4444] hover:text-[#f87171] transition-colors">Soft Delete</button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <!-- DMCA Modal -->
    <div x-show="showDmcaModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm" x-cloak>
        <div class="glow-card w-full max-w-2xl p-10 bg-[var(--bg-base)]" @click.away="showDmcaModal = false">
            <h2 class="font-display text-2xl font-bold uppercase mb-6">DMCA <span class="text-[#38bdf8]">Generator</span></h2>
            
            <div class="space-y-6">
                <div>
                    <label class="block font-mono text-[10px] text-[var(--text-muted)] uppercase mb-2">Reporter Name</label>
                    <input type="text" x-model="dmcaForm.reporter_name" class="w-full bg-[var(--bg-elevated)] border border-[var(--border)] rounded-lg p-3 text-sm focus:border-[#38bdf8] outline-none">
                </div>
                <div>
                    <label class="block font-mono text-[10px] text-[var(--text-muted)] uppercase mb-2">Notice Body</label>
                    <textarea x-model="dmcaTemplate" class="w-full h-64 bg-[var(--bg-base)] border border-[var(--border)] rounded-lg p-4 font-mono text-xs focus:border-[#38bdf8] outline-none resize-none" readonly></textarea>
                </div>
                <div class="flex justify-end gap-4">
                    <button @click="showDmcaModal = false" class="btn-mm opacity-60">Cancel</button>
                    <button @click="copyDmca" class="btn-mm bg-[#38bdf8] text-white px-8">Copy Template</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function moderationHub() {
    return {
        activeTab: 'tracks',
        searchQuery: '',
        showDmcaModal: false,
        dmcaTemplate: '',
        dmcaForm: {
            reporter_name: 'MixMint Compliance Dept',
            reporter_email: 'compliance@mixmint.site'
        },
        selectedItem: null,
        tracks: [],
        albums: [],

        init() {
            this.fetchContent();
        },

        async fetchContent() {
            // In a real impl, this would be an API call
            // For now, initializing with sample data or fetching if view provides it
            this.tracks = JSON.parse('{{ tracks_json|escapejs|default:"[]" }}');
            this.albums = JSON.parse('{{ albums_json|escapejs|default:"[]" }}');
        },

        get filteredItems() {
            const list = this.activeTab === 'tracks' ? this.tracks : this.albums;
            if (!this.searchQuery) return list;
            return list.filter(i => 
                i.title.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                i.dj_name.toLowerCase().includes(this.searchQuery.toLowerCase())
            );
        },

        async openDmcaModal(item) {
            this.selectedItem = item;
            try {
                const res = await fetch("{% url 'admin_dmca' %}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify({
                        content_id: item.id,
                        content_type: this.activeTab === 'tracks' ? 'track' : 'album',
                        reporter_name: this.dmcaForm.reporter_name,
                        reporter_email: this.dmcaForm.reporter_email
                    })
                });
                const data = await res.json();
                this.dmcaTemplate = data.template;
                this.showDmcaModal = true;
            } catch (e) {
                alert("Failed to generate template.");
            }
        },

        async confirmDelete(item) {
            const reason = prompt(`Enter reason for soft-deleting "${item.title}":`, "Policy violation");
            if (!reason) return;

            try {
                const res = await fetch("{% url 'admin_soft_delete' %}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify({
                        content_id: item.id,
                        content_type: this.activeTab === 'tracks' ? 'track' : 'album',
                        reason: reason
                    })
                });
                if (res.ok) {
                    alert("Content archived and DJ notified.");
                    item.is_active = false;
                }
            } catch (e) {
                alert("Action failed.");
            }
        },

        copyDmca() {
            navigator.clipboard.writeText(this.dmcaTemplate);
            alert("DMCA Notice copied to clipboard.");
        }
    }
}
</script>
{% endblock %}
