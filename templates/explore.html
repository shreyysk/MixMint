{% extends 'base.html' %}

{% block title %}Explore DJs & Tracks - MixMint{% endblock %}

{% block content %}
<div class="mb-12">
    <h1 class="text-4xl font-bold mb-4">Discovery</h1>
    <p class="text-gray-400 font-medium">Find your next favorite edit or support a rising DJ.</p>
</div>

<!-- Search & Filter Bar -->
<div
    class="bg-gray-900/50 backdrop-blur-xl p-6 rounded-2xl mb-12 flex flex-col md:flex-row gap-6 items-center border border-gray-800">
    <div class="relative w-full">
        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </span>
        <input type="text" placeholder="Search tracks or DJs..."
            class="bg-gray-800 border-none rounded-xl pl-12 pr-4 py-3 w-full focus:ring-2 focus:ring-pink-500 text-white transition"
            name="search" hx-get="/api/v1/tracks/" hx-target="#track-grid" hx-trigger="keyup changed delay:500ms">
    </div>

    <div class="flex gap-4 w-full md:w-auto">
        <select name="genre" hx-get="/api/v1/tracks/" hx-target="#track-grid" hx-trigger="change"
            class="bg-gray-800 border-none rounded-xl px-6 py-3 focus:ring-2 focus:ring-pink-500 text-white w-full md:w-48 transition cursor-pointer">
            <option value="">All Genres</option>
            <option value="techno">Techno</option>
            <option value="house">House</option>
            <option value="trance">Trance</option>
            <option value="rnb">R&B / Hip-Hop</option>
        </select>

        <select name="ordering" hx-get="/api/v1/tracks/" hx-target="#track-grid" hx-trigger="change"
            class="bg-gray-800 border-none rounded-xl px-6 py-3 focus:ring-2 focus:ring-pink-500 text-white w-full md:w-48 transition cursor-pointer">
            <option value="-created_at">Latest</option>
            <option value="-download_count">Popular</option>
            <option value="price">Price: Low-High</option>
        </select>
    </div>
</div>

<!-- Track Grid -->
<div id="track-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
    <!-- Dummy tracks for visual verification -->
    {% for i in "12345678" %}
    <div
        class="bg-gray-900 border border-gray-800 rounded-3xl overflow-hidden hover:border-pink-500/50 transition-all duration-300 group hover:-translate-y-1">
        <div class="aspect-square bg-gray-800 relative">
            <div
                class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-300 bg-black/60 backdrop-blur-sm">
                <button
                    class="bg-pink-500 p-5 rounded-full shadow-2xl scale-90 group-hover:scale-100 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                    </svg>
                </button>
            </div>
        </div>
        <div class="p-6">
            <h3 class="font-bold text-lg truncate group-hover:text-pink-500 transition">Sample Track {{ forloop.counter
                }}</h3>
            <p class="text-gray-500 text-sm mb-4">DJ Awesome</p>
            <div class="flex justify-between items-center bg-gray-800/50 p-3 rounded-xl">
                <span class="font-mono font-bold text-pink-400">$29.00</span>
                <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Techno</span>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
