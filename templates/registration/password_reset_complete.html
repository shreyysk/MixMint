{% extends 'base.html' %}
{% block title %}Password Updated — MixMint{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-16 relative">
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-[var(--accent-mint)]/5 rounded-full blur-[100px] pointer-events-none z-0"></div>

    <div class="w-full max-w-[440px] mx-auto px-4 relative z-10">
        <div class="glow-card relative border border-[var(--border)] rounded-[16px] p-8 sm:p-10 shadow-[var(--shadow-card)] overflow-hidden text-center">
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-[var(--accent-mint)]/10 rounded-full blur-2xl z-0 pointer-events-none"></div>
            <div class="relative z-10">
                <div class="w-16 h-16 mx-auto mb-6 rounded-full bg-[var(--accent-mint)]/10 border border-[var(--accent-mint)]/20 flex items-center justify-center">
                    <svg class="w-8 h-8 text-[var(--accent-mint)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
                <h1 class="font-display text-[28px] font-[700] text-[var(--text-primary)] mb-4">Password Updated</h1>
                <p class="font-body text-[14px] text-[var(--text-muted)] leading-relaxed mb-8">
                    Your password has been successfully reset. You can now log in with your new password.
                </p>
                <a href="{% url 'login' %}" class="btn-mm btn-mint px-8 shadow-[0_4px_14px_0_rgba(0,255,179,0.2)]">Go to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
