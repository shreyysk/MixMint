{% load tracks_filters %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --accent-mint: #00FFB3;
            --bg-base: #0A0A0F;
            --bg-surface: #111118;
            --text-primary: #F0F0F5;
            --text-muted: #6B6B7E;
        }

        body {
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .embed-card {
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-surface);
        }

        .premium-btn {
            background: var(--accent-mint);
            color: #000;
            font-weight: 700;
            border-radius: 6px;
            padding: 0 16px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            transition: all 0.2s;
        }

        .premium-btn:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
        }
    </style>
</head>

<body class="p-2">
    <div class="embed-card">
        <div class="flex-1 min-h-0 bg-black">
            {% if preview_embed_html %}
            {{ preview_embed_html }}
            {% else %}
            <div class="w-full h-full flex items-center justify-center bg-zinc-900">
                {% if track.cover_url %}
                <img src="{{ track.cover_url }}" class="w-full h-full object-cover opacity-50">
                {% else %}
                <span class="text-4xl">🎧</span>
                {% endif %}
            </div>
            {% endif %}
        </div>
        <div class="p-4 flex items-center justify-between gap-4 border-t border-white/5">
            <div class="min-w-0">
                <h3 class="font-bold text-sm truncate">{{ track.title }}</h3>
                <p class="text-[11px] text-[var(--text-muted)] truncate">{{ track.dj.dj_name }}</p>
            </div>
            <a href="{{ request.build_absolute_uri }}" target="_parent" class="premium-btn text-xs whitespace-nowrap">
                Buy {{ track.price|money }}
            </a>
        </div>
    </div>
</body>

</html>
