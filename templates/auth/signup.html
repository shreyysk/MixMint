{% extends 'base.html' %}

{% block title %}Sign Up - MixMint{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-20">
    <div class="bg-gray-900 border border-gray-800 p-8 rounded-2xl shadow-2xl">
        <h2 class="text-3xl font-bold mb-6 text-center">Join MixMint</h2>
        <form method="post" action="{% url 'accounts/signup' %}">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-gray-400 text-sm mb-2">Full Name</label>
                <input type="text" name="full_name" required
                    class="w-full bg-gray-800 border-gray-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-pink-500">
            </div>
            <div class="mb-4">
                <label class="block text-gray-400 text-sm mb-2">Email Address</label>
                <input type="email" name="email" required
                    class="w-full bg-gray-800 border-gray-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-pink-500">
            </div>
            <div class="mb-6">
                <label class="block text-gray-400 text-sm mb-2">Password</label>
                <input type="password" name="password" required
                    class="w-full bg-gray-800 border-gray-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-pink-500">
            </div>
            <div class="mb-6">
                <label class="flex items-center gap-2 text-gray-400 text-sm">
                    <input type="checkbox" name="is_dj" class="rounded bg-gray-800 border-gray-700 text-pink-500">
                    I am a DJ/Producer
                </label>
            </div>
            <button type="submit"
                class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 rounded-lg transition">
                Create Account
            </button>
        </form>
        <p class="mt-6 text-center text-gray-500 text-sm">
            Already have an account? <a href="/login/" class="text-pink-500">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
